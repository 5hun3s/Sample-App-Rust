name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: SampleRustApp/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./SampleRustApp/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: SampleRustApp
        run: npm ci

      - name: Build Windows application
        working-directory: SampleRustApp
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: samplerustapp-windows
          path: |
            SampleRustApp/src-tauri/target/release/*.exe
            SampleRustApp/src-tauri/target/release/bundle/msi/*.msi
            SampleRustApp/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
